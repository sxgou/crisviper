name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Install package
        run: |
          pip install -e .

      - name: Run pytest tests
        run: |
          pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: |
          pip install ruff

      - name: Run ruff check
        run: |
          ruff check crisviper/

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build
        run: |
          pip install build

      - name: Build sdist and wheel
        run: |
          python -m build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -n "$(ls dist/*.tar.gz 2>/dev/null)" && echo "sdist found ✓" || (echo "sdist missing ✗" && exit 1)
          test -n "$(ls dist/*.whl 2>/dev/null)" && echo "wheel found ✓" || (echo "wheel missing ✗" && exit 1)
